<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="mb-4">Data Pesanan Masuk</h2>
      <div class="card shadow">
        <div class="card-body">
          <table class="table-modern">
            <thead>
              <tr>
                <th>Nama</th>
                <th>No WA</th>
                <th>Jenis Baju</th>
                <th>Jumlah</th>
                <th>Catatan</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <a href="index.html" class="btn-kembali"> Kembali ke Menu Utama </a>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalEdit" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Pesanan</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="formEdit">
              <input type="hidden" id="editId" />
              <div class="mb-3">
                <label class="form-label">Nama Pemesan</label>
                <input
                  type="text"
                  class="form-control"
                  id="editNama"
                  required />
              </div>
              <div class="mb-3">
                <label class="form-label">Jenis Baju</label>
                <input
                  type="text"
                  class="form-control"
                  id="editJenis"
                  required />
              </div>
              <div class="mb-3">
                <label class="form-label">Jumlah</label>
                <input
                  type="number"
                  class="form-control"
                  id="editQty"
                  required />
              </div>
              <div class="mb-3">
                <label class="form-label">Catatan</label>
                <input
                  type="text"
                  class="form-control"
                  id="editCatatan"
                  required />
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Simpan Perubahan
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // 1. Fungsi Ambil Data
      async function ambilData() {
        try {
          const respon = await fetch("/api/orders");
          const data = await respon.json();
          const tbody = document.getElementById("tableBody");
          tbody.innerHTML = "";

          data.forEach((order) => {
            const baris = `
                    <tr>
                        <td>${order.nama_pemesan}</td>
                        <td>${order.no_wa}</td>
                        <td>${order.jenis_baju}</td>
                        <td>${order.jumlah}</td>
                        <td>${order.catatan || "-"}</td>
                        <td>
                            <button class="btn btn-sm btn-warning me-1" onclick="bukaModalEdit('${order._id}', '${order.nama_pemesan}', '${order.jenis_baju}', ${order.jumlah}, '${order.catatan || ""}')">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="hapusPesanan('${order._id}')">Hapus</button>
                        </td>
                    </tr>`;
            tbody.innerHTML += baris;
          });
        } catch (err) {
          console.error("Gagal memuat data:", err);
        }
      }

      // 2. Fungsi Buka Modal & Isi Data Lama
      function bukaModalEdit(id, nama, jenis, qty, catatan) {
        document.getElementById("editId").value = id;
        document.getElementById("editNama").value = nama;
        document.getElementById("editJenis").value = jenis;
        document.getElementById("editQty").value = qty;

        if (document.getElementById("editCatatan")) {
          document.getElementById("editCatatan").value = catatan;
        }

        // Tampilkan modal menggunakan Bootstrap
        var myModal = new bootstrap.Modal(document.getElementById("modalEdit"));
        myModal.show();
      }

      // 3. Fungsi Simpan Perubahan (PUT)
      document.getElementById("formEdit").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("editId").value;
        const dataBaru = {
          nama_pemesan: document.getElementById("editNama").value,
          jenis_baju: document.getElementById("editJenis").value,
          jumlah: document.getElementById("editQty").value,
          catatan: document.getElementById("editCatatan").value,
        };

        try {
          const res = await fetch(`/api/orders/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dataBaru),
          });

          if (res.ok) {
            alert("Data berhasil diupdate!");
            // Tutup modal dan refresh data
            bootstrap.Modal.getInstance(
              document.getElementById("modalEdit"),
            ).hide();
            ambilData();
          }
        } catch (err) {
          alert("Gagal mengupdate data");
        }
      };

      // 4. Fungsi Hapus
      async function hapusPesanan(id) {
        if (confirm("Yakin ingin menghapus pesanan ini?")) {
          try {
            const response = await fetch(`/api/orders/${id}`, {
              method: "DELETE",
            });
            if (response.ok) {
              alert("Pesanan berhasil dihapus!");
              ambilData();
            }
          } catch (err) {
            alert("Terjadi kesalahan koneksi.");
          }
        }
      }

      window.onload = ambilData;
    </script>
  </body>
</html>
