<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesanan Berhasil</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <link rel="stylesheet" href="sukses.css" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 text-center">
          <div class="card shadow-lg card-sukses">
            <div class="card-body">
              <div class="success-icon">✅</div>
              <h2 class="fw-bold mb-3">Sukses!</h2>
              <p class="text-muted mb-4">Terima Kasih sudah memesan🙏.</p>

              <div class="d-grid gap-2">
                <a
                  id="btnLihatPesanan"
                  href="pesanan.html"
                  class="btn btn-primary btn-custom"
                  >Lihat Pesanan Saya</a
                >
                <a
                  href="/index.html"
                  class="btn btn-outline-secondary btn-custom"
                  >Kembali</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const idPesanan = urlParams.get("id");
      const nama = urlParams.get("nama"); // Perbaiki dari params menjadi urlParams

      const btnLihat = document.getElementById("btnLihatPesanan");
      if (idPesanan && idPesanan !== "null") {
        btnLihat.href = `/pesanan.html?id=${idPesanan}`;
      } else {
        btnLihat.style.display = "none";
      }
    </script>
  </body>
</html>
