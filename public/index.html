<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Order Konveksi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4>Formulir Pemesanan Konveksi</h4>
        </div>
        <div class="card-body">
          <form action="/kirim-pesanan" method="POST">
            <div class="mb-3">
              <label>Nama Pemesan</label>
              <input
                type="text"
                name="nama"
                class="form-control"
                required
                placeholder="Nama Anda" />
            </div>

            <div class="mb-3">
              <label>No WhatsApp</label>
              <input
                type="text"
                name="wa"
                class="form-control"
                required
                placeholder="08xxxx" />
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label>Jenis Baju</label>
                <select name="jenis" class="form-select">
                  <option value="Kaos">Kaos Sablon</option>
                  <option value="Kemeja">Kemeja PDL/Korsa</option>
                  <option value="Jaket">Jaket Bomber/Hoodie</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label>Jumlah (Pcs)</label>
                <input
                  type="number"
                  name="qty"
                  class="form-control"
                  required
                  placeholder="Min. 12" />
              </div>
            </div>

            <div class="mb-3">
              <label>Catatan Tambahan</label>
              <textarea
                name="notes"
                class="form-control"
                placeholder="Detail desain, warna, dll..."></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">
              Kirim Pesanan
            </button>
          </form>
        </div>
      </div>
      <div class="text-center mt-3">
        <a href="admin.html" class="btn-back"> Masuk ke Halaman Admin </a>
      </div>
    </div>
  </body>
</html>
