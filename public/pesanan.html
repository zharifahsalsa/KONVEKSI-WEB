<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Pesanan Anda</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #a777e3, #6e8efb);
        min-height: 100vh;
        display: flex;
        align-items: center;
        font-family: "Poppins", sans-serif;
      }
      .card-pesanan {
        border: none;
        border-radius: 20px;
        overflow: hidden;
      }
      .card-header-custom {
        background: white;
        border-bottom: 2px dashed #eee;
        padding: 25px;
      }
      .info-label {
        color: #888;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .info-value {
        color: #333;
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 15px;
      }
      .catatan-box {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 15px;
        border-left: 4px solid #a777e3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-lg card-pesanan">
            <div class="card-header-custom text-center">
              <h4 class="fw-bold m-0" style="color: #6e8efb">
                Nota Pesanan Digital
              </h4>
              <small class="text-muted" id="tglPesan"></small>
            </div>
            <div class="card-body p-4">
              <div id="loader" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Mengambil data pesanan...</p>
              </div>

              <div id="content" style="display: none">
                <div class="row">
                  <div class="col-6">
                    <p class="info-label">Nama Pemesan</p>
                    <p class="info-value" id="resNama"></p>
                  </div>
                  <div class="col-6 text-end">
                    <p class="info-label">No. WhatsApp</p>
                    <p class="info-value" id="resWa"></p>
                  </div>
                </div>

                <p class="info-label">Jenis Baju</p>
                <p class="info-value" id="resJenis"></p>

                <p class="info-label">Jumlah Pesanan</p>
                <p class="info-value"><span id="resQty"></span> Pcs</p>

                <p class="info-label">Catatan Tambahan</p>
                <div class="catatan-box">
                  <p class="m-0 italic" id="resNotes"></p>
                </div>

                <div class="mt-4 d-grid gap-2">
                  <button onclick="window.print()" class="btn btn-light border">
                    Simpan / Cetak Nota
                  </button>
                  <a
                    href="index.html"
                    class="btn btn-primary"
                    style="
                      background: linear-gradient(to right, #a777e3, #6e8efb);
                      border: none;
                    "
                    >Pesan Lagi</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      async function loadPesanan() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          alert("ID Pesanan tidak ditemukan");
        }

        try {
          const res = await fetch(`/api/orders/${id}`);
          const data = await res.json();

          if (data.error) {
            alert("Pesanan tidak ditemukan!");
          } else {
            // DI SINI penempatannya:
            // MongoDB menggunakan '_id' (pakai underscore)
            document.getElementById("orderId").innerText = "ID: " + data._id;

            document.getElementById("dispNama").innerText = data.nama_pemesan;
            document.getElementById("dispJenis").innerText = data.jenis_baju;
            document.getElementById("dispQty").innerText = data.jumlah;
            document.getElementById("dispCatatan").innerText =
              data.catatan || "-";

            // Format Tanggal
            const tgl = new Date(data.tanggal_pesan).toLocaleDateString(
              "id-ID",
              {
                day: "numeric",
                month: "long",
                year: "numeric",
              },
            );
            document.getElementById("tglPesan").innerText = tgl;

            // Tampilkan konten, sembunyikan loader
            document.getElementById("loader").style.display = "none";
            document.getElementById("content").style.display = "block";
          }
        } catch (err) {
          console.error(err);
          alert("Gagal mengambil data");
        }
      }
      loadPesanan();
    </script>
  </body>
</html>
